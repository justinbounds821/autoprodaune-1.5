# Prometheus Configuration for AutoProDaune Microservices

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'autopro-dev'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Infrastructure monitoring
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Microservices (to be added as they're deployed)
  - job_name: 'lead-service'
    static_configs:
      - targets: ['lead-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'video-service'
    static_configs:
      - targets: ['video-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'social-service'
    static_configs:
      - targets: ['social-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'financial-service'
    static_configs:
      - targets: ['financial-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'referral-service'
    static_configs:
      - targets: ['referral-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'automation-service'
    static_configs:
      - targets: ['automation-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'whatsapp-service'
    static_configs:
      - targets: ['whatsapp-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'mcp-service'
    static_configs:
      - targets: ['mcp-service:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
