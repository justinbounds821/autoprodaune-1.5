global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'autopro-daune-monitor'
    environment: 'production'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # bridge: BEGIN autopro-daune scrape
  # AutoPro Daune API metrics
  - job_name: 'autopro-daune-api'
    static_configs:
      - targets: ['host.docker.internal:8001']  # sau 'localhost:8001'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    scheme: http
  # bridge: END autopro-daune scrape

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Redis metrics (if using Redis)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 15s

  # Supabase/PostgreSQL metrics (if accessible)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s