# Fluentd Configuration for AutoPro Daune
# Configurația Fluentd pentru agregarea log-urilor

<system>
  root_dir /tmp/fluentd-buffers/
  log_level info
</system>

# Input plugins
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s
</source>

<source>
  @type tail
  path /var/log/containers/*autopro*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag kubernetes.*
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%NZ
  keep_time_key true
</source>

<source>
  @type tail
  path /app/logs/*.log
  pos_file /var/log/fluentd-app.log.pos
  tag app.*
  format multiline
  format_firstline /^\d{4}-\d{2}-\d{2}/
  format1 /^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) - (?<level>\w+) - (?<message>.*)/
  time_key time
  time_format %Y-%m-%d %H:%M:%S,%3N
  keep_time_key true
</source>

# Parse JSON logs
<filter kubernetes.**>
  @type parser
  key_name log
  reserve_data true
  <parse>
    @type json
    time_key time
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</filter>

# Add Kubernetes metadata
<filter kubernetes.**>
  @type kubernetes_metadata
  @id filter_kube_metadata
  kubernetes_url "#{ENV['FLUENT_FILTER_KUBERNETES_URL'] || 'https://' + ENV['KUBERNETES_SERVICE_HOST'] + ':' + ENV['KUBERNETES_SERVICE_PORT'] + '/api'}"
  verify_ssl "#{ENV['KUBERNETES_VERIFY_SSL'] || true}"
  ca_file "#{ENV['KUBERNETES_CA_FILE']}"
  skip_labels false
  skip_container_metadata false
  skip_master_url false
  skip_namespace_metadata false
</filter>

# Parse application logs
<filter app.**>
  @type record_transformer
  <record>
    service_name ${record["tag"].split(".")[1]}
    environment production
    hostname "#{Socket.gethostname}"
  </record>
</filter>

# Add business context to logs
<filter app.api>
  @type record_transformer
  <record>
    service_type api
    log_type application
  </record>
</filter>

<filter app.dashboard>
  @type record_transformer
  <record>
    service_type dashboard
    log_type application
  </record>
</filter>

<filter app.telegram-bot>
  @type record_transformer
  <record>
    service_type telegram
    log_type application
  </record>
</filter>

<filter app.n8n>
  @type record_transformer
  <record>
    service_type workflow
    log_type application
  </record>
</filter>

# Route logs to different outputs
<match kubernetes.**>
  @type rewrite_tag_filter
  <rule>
    key kubernetes.container_name
    pattern /^autopro-api/
    tag api.${tag}
  </rule>
  <rule>
    key kubernetes.container_name
    pattern /^autopro-dashboard/
    tag dashboard.${tag}
  </rule>
  <rule>
    key kubernetes.container_name
    pattern /^autopro-telegram/
    tag telegram.${tag}
  </rule>
  <rule>
    key kubernetes.container_name
    pattern /^autopro-n8n/
    tag n8n.${tag}
  </rule>
</match>

# Output to Elasticsearch
<match **>
  @type elasticsearch
  @id out_es
  @log_level info
  include_tag_key true
  host "#{ENV['FLUENT_ELASTICSEARCH_HOST'] || 'elasticsearch'}"
  port "#{ENV['FLUENT_ELASTICSEARCH_PORT'] || '9200'}"
  path "#{ENV['FLUENT_ELASTICSEARCH_PATH'] || ''}"
  scheme "#{ENV['FLUENT_ELASTICSEARCH_SCHEME'] || 'http'}"
  ssl_verify "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERIFY'] || 'true'}"
  ssl_version "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERSION'] || 'TLSv1_2'}"
  user "#{ENV['FLUENT_ELASTICSEARCH_USER'] || ''}"
  password "#{ENV['FLUENT_ELASTICSEARCH_PASSWORD'] || ''}"
  reload_connections "#{ENV['FLUENT_ELASTICSEARCH_RELOAD_CONNECTIONS'] || 'false'}"
  reconnect_on_error true
  reload_on_failure true
  log_es_400_reason false
  logstash_format true
  logstash_prefix "autopro-daune"
  logstash_dateformat "%Y%m%d"
  <buffer>
    @type file
    path /var/log/fluentd-buffers/kubernetes.system.buffer
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

# Output to InfluxDB for metrics
<match api.**>
  @type influxdb
  host "#{ENV['INFLUXDB_HOST'] || 'influxdb'}"
  port "#{ENV['INFLUXDB_PORT'] || '8086'}"
  dbname "#{ENV['INFLUXDB_DATABASE'] || 'autopro_logs'}"
  user "#{ENV['INFLUXDB_USER'] || 'admin'}"
  password "#{ENV['INFLUXDB_PASSWORD'] || 'admin'}"
  use_ssl false
  verify_ssl false
  time_precision s
  tag_keys ["service_name", "service_type", "environment", "level"]
  sequence_tag _seq
  <buffer>
    @type file
    path /var/log/fluentd-buffers/api.buffer
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

# Output to Loki for log aggregation
<match **>
  @type loki
  @id out_loki
  url "#{ENV['LOKI_URL'] || 'http://loki:3100'}"
  username "#{ENV['LOKI_USERNAME'] || ''}"
  password "#{ENV['LOKI_PASSWORD'] || ''}"
  extra_labels {"job":"fluentd","environment":"production"}
  <label>
    stream
    service_name
    level
  </label>
  <buffer>
    @type file
    path /var/log/fluentd-buffers/loki.buffer
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

# Output to file for backup
<match **>
  @type file
  @id out_file
  path /var/log/fluentd/output
  append true
  <buffer>
    @type file
    path /var/log/fluentd-buffers/file.buffer
    flush_mode interval
    retry_type exponential_backoff
    flush_thread_count 2
    flush_interval 5s
    retry_forever
    retry_max_interval 30
    chunk_limit_size 2M
    queue_limit_length 8
    overflow_action block
  </buffer>
</match>

# Error handling
<label @ERROR>
  <match **>
    @type file
    path /var/log/fluentd/error
    append true
    <buffer>
      @type file
      path /var/log/fluentd-buffers/error.buffer
      flush_mode interval
      retry_type exponential_backoff
      flush_thread_count 2
      flush_interval 5s
      retry_forever
      retry_max_interval 30
      chunk_limit_size 2M
      queue_limit_length 8
      overflow_action block
    </buffer>
  </match>
</label>
