version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: autopro-api
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - BACKEND_CORS_ORIGINS=http://localhost:3003,http://127.0.0.1:3003,http://localhost:3000
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN:-}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN:-}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN:-}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - WHATSAPP_GROUP_LINK=${WHATSAPP_GROUP_LINK:-https://chat.whatsapp.com/Kz8GEkh4MJV4qg8JmiQmZL}
    volumes:
      - ./services/api:/app
      - video_cache:/app/video_cache
      - content_storage:/app/content_storage
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - autopro-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: autopro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopro-network

  # React Frontend
  frontend:
    build:
      context: ./02_FRONTEND_UI_CLEAN
      dockerfile: Dockerfile
    container_name: autopro-frontend
    ports:
      - "3003:3000"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_API_BASE_URL=http://localhost:8001
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - autopro-network

volumes:
  redis_data:
    driver: local
  video_cache:
    driver: local
  content_storage:
    driver: local

networks:
  autopro-network:
    driver: bridge
