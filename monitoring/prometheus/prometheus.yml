# Prometheus Configuration for AutoPro Daune
# Configurația Prometheus pentru monitorizarea completă a sistemului

global:
  scrape_interval: 15s      # Intervalul de scrape pentru toate job-urile
  evaluation_interval: 15s  # Intervalul de evaluare pentru regulile de alertare
  external_labels:
    cluster: 'autopro-daune-prod'
    environment: 'production'
    region: 'eu-central-1'

# Configurația pentru Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Regulile de alertare
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Configurația de scrape pentru job-uri
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

  # FastAPI Backend API
  - job_name: 'autopro-api'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 10s
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'autopro-api-${1}'
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  # Streamlit Dashboard
  - job_name: 'autopro-dashboard'
    static_configs:
      - targets: ['dashboard:8501']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 15s

  # PostgreSQL Database
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 10s

  # Redis Cache
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

  # Nginx Reverse Proxy
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    scrape_interval: 30s
    metrics_path: /nginx_status
    scheme: http
    scrape_timeout: 10s

  # N8N Workflow Automation
  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']
    scrape_interval: 60s
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 15s

  # Telegram Bot
  - job_name: 'telegram-bot'
    static_configs:
      - targets: ['telegram-bot:8080']
    scrape_interval: 60s
    metrics_path: /metrics
    scheme: http
    scrape_timeout: 15s

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # cAdvisor (Container Metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # Blackbox Exporter (External Monitoring)
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://autoprodane.ro/health
        - https://autoprodane.ro/api/health
        - https://workflows.autoprodane.ro/healthz
        - https://monitoring.autoprodane.ro/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox Exporter (TCP Monitoring)
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        - postgres:5432
        - redis:6379
        - api:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Business Metrics (Custom)
  - job_name: 'business-metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 60s
    metrics_path: /business/metrics
    scheme: http
    scrape_timeout: 15s

  # Financial Metrics (Custom)
  - job_name: 'financial-metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 300s  # 5 minutes
    metrics_path: /financial/metrics
    scheme: http
    scrape_timeout: 30s

  # Social Media Metrics (Custom)
  - job_name: 'social-media-metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 300s  # 5 minutes
    metrics_path: /social/metrics
    scheme: http
    scrape_timeout: 30s

  # Video Generation Metrics (Custom)
  - job_name: 'video-generation-metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 300s  # 5 minutes
    metrics_path: /video/metrics
    scheme: http
    scrape_timeout: 30s

  # Analytics Metrics (Custom)
  - job_name: 'analytics-metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 300s  # 5 minutes
    metrics_path: /analytics/metrics
    scheme: http
    scrape_timeout: 30s

# Configurația pentru remote storage (opțional)
remote_write:
  - url: "https://prometheus-remote-write-endpoint/api/v1/write"
    basic_auth:
      username: "prometheus"
      password: "your-remote-write-password"
    queue_config:
      max_samples_per_send: 1000
      batch_send_deadline: 5s
      max_retries: 10
      min_backoff: 30ms
      max_backoff: 100ms

# Configurația pentru remote read (opțional)
remote_read:
  - url: "https://prometheus-remote-read-endpoint/api/v1/read"
    basic_auth:
      username: "prometheus"
      password: "your-remote-read-password"

# Configurația pentru storage
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB
    min-block-duration: 2h
    max-block-duration: 25h
    wal-compression: true
    min-head-chunks: 1
    max-head-chapters: 1
    max-head-chunk-age: 1h
    stripe-size: 16384
    no-lockfile: false
    memory-snapshot-on-shutdown: true
