name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements_minimal.txt
      - name: Static analysis (compileall)
        run: python -m compileall services/api/app

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 02_FRONTEND_UI_CLEAN/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: 02_FRONTEND_UI_CLEAN
      - name: Lint
        run: npm run lint
        working-directory: 02_FRONTEND_UI_CLEAN
      - name: Build
        run: npm run build
        working-directory: 02_FRONTEND_UI_CLEAN

  deploy:
    name: Deployment
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment placeholder
        run: echo "Deploy step - integrate with deployment platform here."
