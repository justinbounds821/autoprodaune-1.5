version: '3.8'

# AutoProDaune - Infrastructure Services
# This compose file sets up all infrastructure needed for microservices

services:
  # Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: autopro-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: autopro
      RABBITMQ_DEFAULT_PASS: autopro_pass_2025
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - autopro-network
    restart: unless-stopped

  # Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: autopro-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass autopro_redis_2025
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopro-network
    restart: unless-stopped

  # PostgreSQL (Local development - production uses Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: autopro-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autopro
      POSTGRES_PASSWORD: autopro_pass_2025
      POSTGRES_DB: autopro_dev
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autopro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopro-network
    restart: unless-stopped

  # Prometheus (Metrics collection)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: autopro-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - autopro-network
    restart: unless-stopped
    depends_on:
      - alertmanager

  # AlertManager (Alert routing)
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: autopro-alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./infrastructure/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - autopro-network
    restart: unless-stopped

  # Grafana (Metrics visualization)
  grafana:
    image: grafana/grafana:10.2.2
    container_name: autopro-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: autopro_grafana_2025
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: 'redis-datasource,grafana-piechart-panel'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - autopro-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Jaeger (Distributed tracing)
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: autopro-jaeger
    ports:
      - "5775:5775/udp"   # accept zipkin.thrift over compact thrift protocol
      - "6831:6831/udp"   # accept jaeger.thrift over compact thrift protocol
      - "6832:6832/udp"   # accept jaeger.thrift over binary thrift protocol
      - "5778:5778"       # serve configs
      - "16686:16686"     # serve frontend
      - "14268:14268"     # accept jaeger.thrift directly from clients
      - "14250:14250"     # accept model.proto
      - "9411:9411"       # Zipkin compatible endpoint
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ':9411'
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - autopro-network
    restart: unless-stopped

  # Kong API Gateway
  kong-database:
    image: postgres:15-alpine
    container_name: autopro-kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_pass_2025
      POSTGRES_DB: kong
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autopro-network
    restart: unless-stopped

  kong-migrations:
    image: kong:3.4-alpine
    container_name: autopro-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass_2025
      KONG_PG_DATABASE: kong
    networks:
      - autopro-network
    depends_on:
      - kong-database
    restart: on-failure

  kong:
    image: kong:3.4-alpine
    container_name: autopro-kong
    ports:
      - "8000:8000"   # HTTP proxy
      - "8443:8443"   # HTTPS proxy
      - "8001:8001"   # Admin API HTTP
      - "8444:8444"   # Admin API HTTPS
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_pass_2025
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001, 0.0.0.0:8444 ssl'
      KONG_PLUGINS: 'bundled,rate-limiting,jwt,cors'
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - autopro-network
    restart: unless-stopped
    depends_on:
      - kong-database
      - kong-migrations

  # Nginx (Static file serving & load balancing)
  nginx:
    image: nginx:alpine
    container_name: autopro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - autopro-network
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  kong_data:
    driver: local

networks:
  autopro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
