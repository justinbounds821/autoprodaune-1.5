version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: autopro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - autopro-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: autopro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autopro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autopro-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: autopro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - autopro-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: autopro-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - autopro-network
    restart: unless-stopped

  lead-service:
    build:
      context: .
      dockerfile: microservices/lead-service/Dockerfile
    container_name: autopro-lead-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/autopro
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
    depends_on:
      - redis
      - postgres
    networks:
      - autopro-network
    restart: unless-stopped
  video-service:
