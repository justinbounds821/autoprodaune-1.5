name: Smoke Tests (docker-compose)

on:
  workflow_dispatch:
  push:
    branches: [main, develop, cursor/**]
  pull_request:
    branches: [main, develop]

jobs:
  smoke-docker-compose:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      
      - name: Verify files before build
        run: |
          ls -la autopro_refactor_full_connected/ || echo "Directory not found"
          ls -la autopro_refactor_full_connected/docker-compose.yml || echo "Compose file not found"
      
      - name: Build services
        run: |
          docker-compose \
            -f autopro_refactor_full_connected/docker-compose.yml \
            -f autopro_refactor_full_connected/docker-compose.override.yml \
            --project-directory autopro_refactor_full_connected \
            build --no-cache
      
      - name: Start services
        run: |
          docker-compose \
            -f autopro_refactor_full_connected/docker-compose.yml \
            -f autopro_refactor_full_connected/docker-compose.override.yml \
            --project-directory autopro_refactor_full_connected \
            up -d
      
      - name: Wait & health check - lead-service
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8001/health; then
              echo "✅ lead-service OK"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "❌ lead-service DOWN after 120s"
              exit 1
            fi
            sleep 1
          done
      
      - name: Wait & health check - mcp-service
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8010/health; then
              echo "✅ mcp-service OK"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "❌ mcp-service DOWN after 120s"
              exit 1
            fi
            sleep 1
          done
      
      - name: Check Prometheus
        run: curl -f http://localhost:9090/-/ready || exit 1
      
      - name: Check Grafana
        run: curl -f http://localhost:3000/api/health || exit 1
      
      - name: Show service logs on failure
        if: failure()
        run: |
          cd autopro_refactor_full_connected
          docker-compose logs
      
      - name: Cleanup
        if: always()
        run: |
          docker-compose \
            -f autopro_refactor_full_connected/docker-compose.yml \
            -f autopro_refactor_full_connected/docker-compose.override.yml \
            --project-directory autopro_refactor_full_connected \
            down -v
