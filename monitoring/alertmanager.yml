global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@autoprodaune.ro'

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 1h

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://api:8000/api/notifications/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@autoprodaune.ro'
        subject: '🚨 CRITICAL: AutoPro Daune Alert - {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          Service: {{ .CommonLabels.service }}

          {{ range .Alerts }}
          Description: {{ .Annotations.description }}
          {{ end }}

          Dashboard: http://monitoring.autoprodaune.ro:3000
    webhook_configs:
      - url: 'http://api:8000/api/notifications/webhook'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'monitoring@autoprodaune.ro'
        subject: '⚠️ WARNING: AutoPro Daune Alert - {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          Service: {{ .CommonLabels.service }}

          {{ range .Alerts }}
          Description: {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']