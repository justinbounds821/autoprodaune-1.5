# AutoPro API Gateway - Nginx Configuration
# Routes requests to microservices

upstream core_api {
    server core-api:8000;
}

upstream video_service {
    server video-service:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=video_limit:10m rate=2r/s;

server {
    listen 80;
    server_name localhost;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Max body size (for video uploads)
    client_max_body_size 100M;
    
    # Global rate limit (API)
    limit_req zone=api_limit burst=20 nodelay;
    
    # ==================== HEALTH CHECK ====================
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ==================== CORE API ROUTES ====================
    
    # Leads endpoints
    location /api/leads {
        proxy_pass http://core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Referrals endpoints
    location /api/referrals {
        proxy_pass http://core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Financial endpoints
    location /api/financial {
        proxy_pass http://core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # ==================== VIDEO SERVICE ROUTES ====================
    
    # Video generation endpoints
    location /api/video {
        limit_req zone=video_limit burst=5 nodelay;
        
        proxy_pass http://video_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;  # 5 minutes for video upload
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # WebSocket for video progress
    location /api/video/progress {
        proxy_pass http://video_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # 1 hour for WebSocket
    }
    
    # ==================== METRICS ====================
    
    # Prometheus metrics (all services)
    location /metrics/core {
        proxy_pass http://core_api/metrics;
        access_log off;
    }
    
    location /metrics/video {
        proxy_pass http://video_service/metrics;
        access_log off;
    }
    
    # ==================== FALLBACK ====================
    
    # Default route (404)
    location / {
        return 404 '{"error": "Not found", "message": "Use /api/* endpoints"}';
        add_header Content-Type application/json;
    }
}
